<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />

        <!-- SEO Meta Tags (Optimised) -->
        <meta
            name="description"
            content="Tirages d'art de photographie maritime et paysages méditerranéens par Franck Rouane. Impression fine art Hahnemühle, édition limitée, décoration murale mer."
        />
        <meta
            name="keywords"
            content="photographie maritime, tirage d'art, photo mer Méditerranée, photographe Côte d'Azur, impression fine art, décoration murale mer, Mediterranean seascape photography, fine art print, coastal wall art, French Riviera photographer, sea photography print"
        />
        <meta name="author" content="Franck Rouane" />

        <!-- Canonical & alternate links -->
        <link rel="canonical" href="https://frouanephotographie.com/" />
        <link rel="alternate" hreflang="fr" href="https://frouanephotographie.com/" />
        <link rel="alternate" hreflang="en" href="https://frouanephotographie.com/en" />

        <!-- Open Graph / Facebook (Optimised) -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://frouanephotographie.com/" />
        <meta property="og:title" content="Photographie maritime &amp; tirages d'art | Franck Rouane" />
        <meta
            property="og:description"
            content="Découvrez des tirages d'art en édition limitée de la mer Méditerranée et de la Côte d'Azur. Fine art prints pour décoration murale, qualité muséale."
        />
        <meta property="og:image" content="%PUBLIC_URL%/og-image.jpg" />
        <meta property="og:locale" content="fr_FR" />
        <meta property="og:locale:alternate" content="en_US" />

        <!-- Twitter (Optimised) -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:url" content="https://frouanephotographie.com/" />
        <meta name="twitter:title" content="Mediterranean seascape photography &amp; fine art prints" />
        <meta
            name="twitter:description"
            content="Fine art prints of Mediterranean seascapes and French Riviera landscapes by Franck Rouane. Limited edition photographic art for coastal wall decor."
        />
        <meta name="twitter:image" content="%PUBLIC_URL%/og-image.jpg" />

        <!-- Preconnects & fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />

        <title>Photographie maritime &amp; tirages d'art Côte d'Azur | Franck Rouane</title>

        <!-- Structured data using JSON-LD -->
        <script type="application/ld+json">
            {
              "@context": "https://schema.org",
              "@graph": [
                {
                  "@type": "LocalBusiness",
                  "@id": "https://frouanephotographie.com/#business",
                  "name": "Franck Rouane Photographie",
                  "description": "Photographe spécialisé en paysages maritimes méditerranéens proposant des tirages d'art en édition limitée.",
                  "url": "https://frouanephotographie.com/",
                  "image": "%PUBLIC_URL%/og-image.jpg",
                  "telephone": "+33 6 00 00 00 00",
                  "address": {
                    "@type": "PostalAddress",
                    "addressLocality": "Côte d'Azur",
                    "addressCountry": "FR"
                  },
                  "areaServed": {
                    "@type": "Place",
                    "name": "Méditerranée / Mediterranean"
                  }
                },
                {
                  "@type": "ImageGallery",
                  "@id": "https://frouanephotographie.com/#gallery",
                  "name": "Galerie de photographies maritimes",
                  "associatedMedia": [
                    {
                      "@type": "ImageObject",
                      "contentUrl": "%PUBLIC_URL%/sunrise-laciotat.jpeg",
                      "caption": "Lever de soleil sur la Méditerranée"
                    },
                    {
                      "@type": "ImageObject",
                      "contentUrl": "%PUBLIC_URL%/Salon-sormiou.png",
                      "caption": "Salon lumineux avec vue sur Sormiou"
                    },
                    {
                      "@type": "ImageObject",
                      "contentUrl": "%PUBLIC_URL%/og-image.jpg",
                      "caption": "Paysage maritime en Côte d'Azur"
                    }
                  ]
                },
                {
                  "@type": "Product",
                  "@id": "https://frouanephotographie.com/#prints",
                  "name": "Tirages d'art de photographie maritime",
                  "description": "Tirages Fine Art sur papier Hahnemühle, édition limitée et numérotée. Photographies de la mer Méditerranée et de la Côte d'Azur.",
                  "image": [
                    "%PUBLIC_URL%/sunrise-laciotat.jpeg",
                    "%PUBLIC_URL%/Salon-sormiou.png"
                  ],
                  "brand": {
                    "@type": "Brand",
                    "name": "Franck Rouane Photographie"
                  },
                  "offers": {
                    "@type": "Offer",
                    "price": "180",
                    "priceCurrency": "EUR",
                    "availability": "https://schema.org/InStock",
                    "url": "https://frouanephotographie.com/boutique"
                  }
                }
              ]
            }
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
